<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b14">
<title>أوامر أفاتار</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}

body{
  font-family: "Segoe UI","Helvetica Neue",Tahoma,Arial,sans-serif;
  background:#070b14;
  color:#fff;
  min-height:100vh;
}

/* ===== BACKGROUND ===== */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 700px 500px at 15% 20%, rgba(0,100,220,0.13) 0%,transparent 70%),
    radial-gradient(ellipse 500px 400px at 85% 75%, rgba(0,200,255,0.09) 0%,transparent 70%),
    #070b14;
}
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.035) 1px,transparent 1px);
  background-size:38px 38px;
}

/* ===== HEADER ===== */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(7,11,20,0.94);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(0,212,255,0.15);
  padding:13px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo-title{font-size:1.2rem;font-weight:900;background:linear-gradient(90deg,#00d4ff,#0088ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:0.68rem;color:#5a7a96;margin-top:2px}
.badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,212,255,0.2);
  border-radius:20px;padding:5px 12px;
  font-size:0.72rem;color:#00d4ff;font-weight:700;
}
.dot{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88}

/* ===== WAKE BUTTON ===== */
.wake-section{
  position:relative;z-index:1;
  padding:26px 20px 14px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.wake-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.ring{
  position:absolute;border-radius:50%;border:1px solid rgba(0,212,255,0.25);
  animation:pring 2s infinite ease-out;
}
.ring1{width:120px;height:120px}
.ring2{width:140px;height:140px;animation-delay:0.6s}

@keyframes pring{
  0%{transform:scale(0.9);opacity:0.8}
  100%{transform:scale(1.25);opacity:0}
}

.wake-btn{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,rgba(0,180,255,0.18),rgba(0,80,200,0.22));
  border:2px solid #00d4ff;
  color:#00d4ff;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  box-shadow:0 0 28px rgba(0,212,255,0.3),inset 0 0 18px rgba(0,212,255,0.05);
  transition:all 0.18s ease;
  font-size:2rem;
  z-index:1;position:relative;
}
.wake-btn:active{transform:scale(0.88);box-shadow:0 0 40px rgba(0,212,255,0.5)}
.wake-label{font-size:0.62rem;color:#fff;font-weight:700;letter-spacing:0.5px}

.wake-info{text-align:center}
.wake-info h2{font-size:0.95rem;font-weight:800}
.wake-info p{font-size:0.73rem;color:#5a7a96;margin-top:4px}

/* ===== TABS ===== */
.tabs-bar{
  position:relative;z-index:1;
  padding:4px 16px 12px;
}
.tabs{
  display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:11px;
  padding:7px 13px;
  color:#5a7a96;
  font-size:0.8rem;font-weight:700;
  cursor:pointer;white-space:nowrap;
  transition:all 0.2s;
  display:flex;align-items:center;gap:6px;
}
.tab.on{
  background:rgba(0,212,255,0.13);
  border-color:rgba(0,212,255,0.5);
  color:#00d4ff;
  box-shadow:0 0 10px rgba(0,212,255,0.15);
}

/* ===== CONTENT ===== */
.content{
  position:relative;z-index:1;
  padding:0 14px 120px;
}
.sec{display:none}
.sec.on{display:block;animation:fadein 0.25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.sec-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
  padding-right:12px;
  border-right:3px solid #00d4ff;
}
.sec-head .ico{font-size:1.1rem}
.sec-head span{font-size:1rem;font-weight:900}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;margin-bottom:6px;
}
@media(min-width:380px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:520px){.grid{grid-template-columns:repeat(5,1fr)}}

/* ===== CARD ===== */
.card{
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:15px;
  padding:13px 6px 11px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:7px;
  cursor:pointer;
  transition:all 0.16s ease;
  user-select:none;
  position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,212,255,0.1),transparent);
  opacity:0;transition:opacity 0.2s;
}
.card:active{
  transform:scale(0.91);
  border-color:rgba(0,212,255,0.6);
  box-shadow:0 0 20px rgba(0,212,255,0.3);
}
.card:active::after{opacity:1}
.card.flash{
  border-color:#00d4ff;
  box-shadow:0 0 22px rgba(0,212,255,0.4);
  animation:flash 0.5s ease;
}
@keyframes flash{
  0%{transform:scale(1)}
  30%{transform:scale(0.93)}
  65%{transform:scale(1.04)}
  100%{transform:scale(1)}
}

.c-icon{
  font-size:1.5rem;
  width:44px;height:44px;
  border-radius:13px;
  background:rgba(0,212,255,0.08);
  border:1px solid rgba(0,212,255,0.14);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.c-ar{font-size:0.75rem;font-weight:700;color:#def0ff;line-height:1.3}
.c-cn{
  font-size:0.58rem;color:#4a6a84;line-height:1.3;
  font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:72px;left:50%;
  transform:translateX(-50%) translateY(-14px);
  background:rgba(0,20,40,0.9);
  border:1px solid rgba(0,212,255,0.5);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:9px 20px;
  font-size:0.83rem;font-weight:700;color:#00d4ff;
  z-index:500;opacity:0;
  transition:all 0.28s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;max-width:88vw;
  overflow:hidden;text-overflow:ellipsis;
  pointer-events:none;
  display:flex;align-items:center;gap:7px;
  direction:ltr;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== FOOTER ===== */
footer{
  position:fixed;bottom:0;left:0;width:100%;
  background:rgba(5,9,18,0.97);
  border-top:1px solid rgba(0,212,255,0.12);
  backdrop-filter:blur(20px);
  padding:11px 20px;
  display:flex;justify-content:center;align-items:center;
  z-index:200;
}
.credit{font-size:0.76rem;color:#4a6a84;display:flex;align-items:center;gap:6px}
.credit b{color:#00d4ff}
.heart{color:#ff4757;animation:hb 1.4s infinite}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* ===== PWA ADD TO HOME BANNER ===== */
.install-bar{
  position:relative;z-index:1;
  margin:0 14px 14px;
  background:rgba(0,212,255,0.08);
  border:1px solid rgba(0,212,255,0.25);
  border-radius:14px;
  padding:11px 14px;
  display:flex;align-items:center;gap:10px;
}
.install-bar .ib-text{flex:1;font-size:0.78rem;line-height:1.4;color:#a0c4d8}
.install-bar .ib-text b{color:#fff}
.install-bar .ib-close{
  background:none;border:none;color:#4a6a84;
  font-size:1.1rem;cursor:pointer;padding:4px;flex-shrink:0;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>

<!-- HEADER -->
<header>
  <div>
    <div class="logo-title">🚗 أفاتار</div>
    <div class="logo-sub">مساعد السيارة الصوتي</div>
  </div>
  <div class="badge"><div class="dot"></div>جاهز</div>
</header>

<!-- WAKE -->
<div class="wake-section">
  <div class="wake-wrap">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <button class="wake-btn" onclick="speak('嗨，小艺','هي شياو يي')">
      <span>🎙️</span>
      <span class="wake-label">تفعيل</span>
    </button>
  </div>
  <div class="wake-info">
    <h2>اضغط للتحدث مع السيارة</h2>
    <p>ابدأ دائماً بـ «هي شياو يي» لتفعيل المساعد</p>
  </div>
</div>

<!-- INSTALL HINT -->
<div class="install-bar" id="ib">
  <span style="font-size:1.3rem">📲</span>
  <div class="ib-text">
    <b>حفظ في الهاتف بدون إنترنت:</b><br>
    افتح الملف في Chrome ← القائمة ← «إضافة إلى الشاشة الرئيسية»
  </div>
  <button class="ib-close" onclick="document.getElementById('ib').remove()">✕</button>
</div>

<!-- TABS -->
<div class="tabs-bar"><div class="tabs" id="tabs"></div></div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- TOAST -->
<div class="toast" id="toast"><span>🔊</span><span id="t-txt"></span></div>

<!-- FOOTER -->
<footer>
  <div class="credit">
    صنع بـ <span class="heart">❤️</span> في الإمارات &nbsp;•&nbsp; <b>@binnoma</b>
  </div>
</footer>

<script>
// ===== بيانات الأوامر =====
const cats = [
  { id:"wake", title:"التفعيل", ico:"🎙️", items:[
    { ar:"تفعيل المساعد",    cn:"嗨，小艺",       ico:"🎙️" },
    { ar:"أهلاً",            cn:"你好，小艺",     ico:"👋" },
    { ar:"شكراً",            cn:"谢谢",           ico:"👍" },
  ]},
  { id:"win", title:"النوافذ والأبواب", ico:"🚪", items:[
    { ar:"فتح النافذة اليمنى",  cn:"打开右边车窗",     ico:"⬆️" },
    { ar:"فتح النافذة اليسرى",  cn:"打开左边车窗",     ico:"⬆️" },
    { ar:"فتح كل النوافذ",      cn:"把所有车窗打开",   ico:"🔓" },
    { ar:"غلق النوافذ",         cn:"关闭车窗",         ico:"⬇️" },
    { ar:"فتح السقف",           cn:"打开天窗",         ico:"☀️" },
    { ar:"إغلاق السقف",         cn:"关闭天窗",         ico:"🌙" },
    { ar:"فتح الصندوق الخلفي",  cn:"打开后备箱",       ico:"🧳" },
    { ar:"فتح الصندوق الأمامي", cn:"打开前备箱",       ico:"💼" },
    { ar:"فتح باب الوقود",      cn:"打开油箱盖",       ico:"⛽" },
    { ar:"طوي المرايا",         cn:"折叠后视镜",       ico:"🔺" },
    { ar:"فرد المرايا",         cn:"展开后视镜",       ico:"🔻" },
  ]},
  { id:"ac", title:"المكيف", ico:"❄️", items:[
    { ar:"تشغيل المكيف",   cn:"打开空调",        ico:"❄️" },
    { ar:"إيقاف المكيف",   cn:"关闭空调",        ico:"🚫" },
    { ar:"20 درجة",        cn:"把温度调到20度",  ico:"🌡️" },
    { ar:"22 درجة",        cn:"把温度调到22度",  ico:"🌡️" },
    { ar:"24 درجة",        cn:"把温度调到24度",  ico:"🌡️" },
    { ar:"26 درجة",        cn:"把温度调到26度",  ico:"🌡️" },
    { ar:"أبرد",           cn:"温度低一点",      ico:"🧊" },
    { ar:"أدفأ",           cn:"温度高一点",      ico:"🔥" },
    { ar:"تدفئة المقعد",   cn:"打开座椅加热",    ico:"🔥" },
    { ar:"تهوية المقعد",   cn:"打开座椅通风",    ico:"💨" },
    { ar:"تدفئة المقود",   cn:"打开方向盘加热",  ico:"🕹️" },
  ]},
  { id:"seat", title:"المقاعد", ico:"💺", items:[
    { ar:"وضع القيلولة",   cn:"休息模式",        ico:"😴" },
    { ar:"وضع الجاذبية",   cn:"打开零重力模式",  ico:"🚀" },
    { ar:"تعديل الظهر",    cn:"调直座椅",        ico:"↕️" },
    { ar:"تشغيل التدليك",  cn:"打开座椅按摩",    ico:"💆" },
    { ar:"إيقاف التدليك",  cn:"关闭座椅按摩",    ico:"🛑" },
  ]},
  { id:"nav", title:"الملاحة", ico:"📍", items:[
    { ar:"الذهاب للمنزل",        cn:"导航回家",              ico:"🏠" },
    { ar:"محطة شحن قريبة",       cn:"导航到最近的充电站",    ico:"🔋" },
    { ar:"بدء الملاحة",          cn:"开始导航",              ico:"🗺️" },
    { ar:"إلغاء الملاحة",        cn:"结束导航",              ico:"✖️" },
    { ar:"الطريق الأسرع",        cn:"选择最快路线",          ico:"⚡" },
    { ar:"تجنب الطرق السريعة",   cn:"避开高速公路",          ico:"🛣️" },
  ]},
  { id:"media", title:"الترفيه", ico:"🎵", items:[
    { ar:"تشغيل موسيقى",    cn:"播放音乐",       ico:"🎵" },
    { ar:"إيقاف مؤقت",      cn:"暂停音乐",       ico:"⏸️" },
    { ar:"المقطع التالي",   cn:"下一首",         ico:"⏭️" },
    { ar:"المقطع السابق",   cn:"上一首",         ico:"⏮️" },
    { ar:"رفع الصوت",       cn:"声音大一点",     ico:"🔊" },
    { ar:"تخفيض الصوت",     cn:"声音小一点",     ico:"🔉" },
    { ar:"كتم الصوت",       cn:"静音",           ico:"🔇" },
    { ar:"فتح دوين",        cn:"打开抖音",       ico:"🎬" },
    { ar:"فتح بيليبيلي",    cn:"打开哔哩哔哩",   ico:"📺" },
    { ar:"كوجو ميوزك",      cn:"打开酷狗音乐",   ico:"🎧" },
    { ar:"فتح وي تشات",     cn:"打开微信",       ico:"💬" },
    { ar:"هيمالايا راديو",  cn:"打开喜马拉雅",   ico:"📻" },
  ]},
  { id:"light", title:"الإضاءة", ico:"💡", items:[
    { ar:"تشغيل الإضاءة",   cn:"打开氛围灯",          ico:"💡" },
    { ar:"إطفاء الإضاءة",   cn:"关闭氛围灯",          ico:"🌑" },
    { ar:"لون أزرق",        cn:"把氛围灯调成蓝色",     ico:"🔵" },
    { ar:"لون أبيض",        cn:"把氛围灯调成白色",     ico:"⚪" },
    { ar:"لون أحمر",        cn:"把氛围灯调成红色",     ico:"🔴" },
    { ar:"لون أخضر",        cn:"把氛围灯调成绿色",     ico:"🟢" },
  ]},
  { id:"home", title:"البيت", ico:"🏠", items:[
    { ar:"تشغيل مكيف البيت",   cn:"打开家里的空调",   ico:"🏡" },
    { ar:"إيقاف مكيف البيت",   cn:"关闭家里的空调",   ico:"🚫" },
    { ar:"أضواء البيت",        cn:"打开家里的灯",     ico:"🔆" },
    { ar:"إطفاء أضواء البيت",  cn:"关闭家里的灯",     ico:"🌙" },
  ]},
];

// ===== بناء الواجهة =====
const tabsEl   = document.getElementById('tabs');
const contentEl= document.getElementById('content');

cats.forEach((cat, i) => {
  // تبويب
  const t = document.createElement('button');
  t.className = 'tab' + (i===0?' on':'');
  t.dataset.id = cat.id;
  t.innerHTML  = cat.ico + ' ' + cat.title;
  t.onclick    = () => switchTab(cat.id);
  tabsEl.appendChild(t);

  // قسم
  const sec = document.createElement('div');
  sec.className = 'sec' + (i===0?' on':'');
  sec.id = 's-' + cat.id;

  const head = document.createElement('div');
  head.className = 'sec-head';
  head.innerHTML = `<span class="ico">${cat.ico}</span><span>${cat.title}</span>`;
  sec.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'grid';

  cat.items.forEach(item => {
    const c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = `
      <div class="c-icon">${item.ico}</div>
      <div class="c-ar">${item.ar}</div>
      <div class="c-cn">${item.cn}</div>
    `;
    c.onclick = () => speak(item.cn, item.ar, c);
    grid.appendChild(c);
  });

  sec.appendChild(grid);
  contentEl.appendChild(sec);
});

// ===== تبديل التبويب =====
function switchTab(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelector(`[data-id="${id}"]`).classList.add('on');
  document.getElementById('s-'+id).classList.add('on');
  document.querySelector(`[data-id="${id}"]`).scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

// ===== النطق =====
let toastT;
function speak(cn, ar, card){
  // نطق صيني
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(cn);
    u.lang  = 'zh-CN';
    u.rate  = 0.88;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  }

  // تأثير البطاقة
  if(card){ card.classList.add('flash'); setTimeout(()=>card.classList.remove('flash'),600); }

  // إشعار
  const toast = document.getElementById('toast');
  document.getElementById('t-txt').textContent = cn + '  ·  ' + ar;
  toast.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(()=>toast.classList.remove('on'), 2800);
}
</script>
</body>
</html>
