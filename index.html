        /* تعريف المتغيرات والألوان */
        :root {
            --blue: #00d4ff;
            --blue2: #0099ff;
            --dark: #050a14;
            --card: rgba(255,255,255,0.08);
            --border: rgba(0,212,255,0.15);
            --text: #ffffff;
            --sub: #8ab4e8;
            --active: rgba(0,212,255,0.2);
            --glow: 0 0 20px rgba(0,212,255,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #02040a 0%, #0a1525 50%, #02040a 100%);
        }

        /* شبكة الخلفية التزيينية */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* دوائر ضوئية للخلفية */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 50% 0%, rgba(0,212,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(0,100,200,0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        /* هيدر */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5,10,20,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            flex-direction: column;
            position: relative; 
        }

        /* تنسيق أيقونة تيك توك */
        .tiktok-link {
            position: absolute;
            top: -10px; 
            left: -10px; 
            color: #ff0050; 
            text-decoration: none;
            font-size: 1.2rem;
            animation: tiktok-bounce 2s infinite;
            z-index: 101;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes tiktok-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo h1 {
            font-size: 1.3rem;
            font-weight: 900;
            background: linear-gradient(90deg, #00d4ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .logo p {
            font-size: 0.7rem;
            color: var(--sub);
            margin-top: 4px;
        }

        /* زر تبديل اللغة */
        .lang-switch {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--blue);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }
        .lang-switch:active {
            background: rgba(0,212,255,0.15);
            transform: scale(0.95);
        }

        .car-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: var(--blue);
            font-weight: 700;
        }

        /* زر التفعيل */
        .wake-section {
            padding: 30px 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .wake-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,150,255,0.2));
            border: 3px solid var(--blue);
            color: var(--blue);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: var(--glow);
            transition: all 0.2s ease;
            position: relative;
        }

        .wake-btn:active {
            transform: scale(0.9);
            background: rgba(0,212,255,0.25);
        }

        .wake-btn svg {
            width: 50px;
            height: 50px;
            fill: var(--blue);
            filter: drop-shadow(0 0 5px rgba(0,212,255,0.5));
        }

        .wake-btn span {
            font-size: 0.65rem;
            color: white;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }

        .wake-info {
            text-align: center;
        }
        .wake-info h2 { font-size: 1rem; font-weight: 700; color: #fff; }
        .wake-info p { font-size: 0.8rem; color: var(--sub); margin-top: 4px; }

        /* تبويبات */
        .tabs-wrapper {
            padding: 0 16px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex-shrink: 0;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 7px 14px;
            color: var(--sub);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .tab-btn.active, .tab-btn:active {
            background: rgba(0,212,255,0.15);
            border-color: var(--blue);
            color: var(--blue);
            box-shadow: 0 0 10px rgba(0,212,255,0.2);
        }

        /* المحتوى */
        .content {
            padding: 0 16px 110px;
            position: relative;
            z-index: 1;
        }

        .section {
            display: none;
        }
        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-right: 10px;
            border-right: 3px solid var(--blue);
        }

        .section-title i { font-style: normal; font-size: 1.2rem; }
        .section-title span { font-size: 0.95rem; font-weight: 900; }

        /* شبكة الأوامر */
        .cmd-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }
        @media (min-width: 400px) {
            .cmd-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* بطاقة الأمر */
        .cmd-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 12px 6px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .cmd-card:active {
            transform: scale(0.92);
            border-color: var(--blue);
            background: rgba(0,212,255,0.1);
        }

        /* تصميم الإيموجي */
        .cmd-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .cmd-ar { /* سيستخدم للنص العربي والإنجليزي */
            font-size: 0.75rem;
            font-weight: 700;
            color: #e8f4ff;
            line-height: 1.2;
        }

        .cmd-cn {
            font-size: 0.5rem;
            color: var(--sub);
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            max-height: 2.4em;
        }

        /* إشعار */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,212,255,0.15);
            border: 1px solid var(--blue);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--blue);
            z-index: 500;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
            max-width: 85vw;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* فوتر */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(5,10,20,0.98);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 200;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-inner {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--sub);

        .heart { color: #ff4757; animation: hb 1.4s infinite; }

        .github-link {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-right: 8px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .github-link:hover { opacity: 0.8; }
        .name { color: var(--blue); font-weight: bold; }
    </style>
</head>

// دالة تبديل اللغة
function toggleLanguage() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    document.getElementById('lang-text').innerText = currentLang === 'ar' ? 'English' : 'عربي';
    
    // تغيير اتجاه الصفحة (RTL/LTR)
    document.documentElement.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
    
    // تحديث النصوص الثابتة
    document.getElementById('page-title').innerText = (currentLang === 'ar' ? '🚗 أفاتار' : '🚗 Avatr') + (currentLang === 'ar' ? '' : ' Voice Assistant');
    document.getElementById('page-subtitle').innerText = uiText[currentLang].subtitle;
    document.getElementById('status-text').innerText = uiText[currentLang].status;
    document.getElementById('wake-text').innerText = uiText[currentLang].wakeBtn;
    document.getElementById('info-title').innerText = uiText[currentLang].infoTitle;
    document.getElementById('info-desc').innerText = uiText[currentLang].infoDesc;
    document.getElementById('footer-love').innerText = uiText[currentLang].footerLove;
    document.getElementById('footer-loc').innerText = uiText[currentLang].footerLoc;

    // إعادة رسم المحتوى
    renderContent();
}

// دالة رسم المحتوى
function renderContent() {
    const tabsEl = document.getElementById('tabs');
    const contentEl = document.getElementById('content');
    
    // تفريغ القديم
    tabsEl.innerHTML = '';
    contentEl.innerHTML = '';

    categories.forEach((cat, idx) => {
        // تبويب
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
        btn.dataset.id = cat.id;
        // اختيار العنوان بناءً على اللغة
        const titleToShow = currentLang === 'ar' ? cat.title : cat.title_en;
        btn.innerHTML = `<span>${cat.icon}</span> ${titleToShow}`;
        btn.onclick = () => switchTab(cat.id);
        tabsEl.appendChild(btn);

        // قسم
        const sec = document.createElement('div');
        sec.className = 'section' + (idx === 0 ? ' active' : '');
        sec.id = 'sec-' + cat.id;

        const grid = document.createElement('div');
        grid.className = 'cmd-grid';

        cat.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'cmd-card';
            // اختيار النص بناءً على اللغة
            const textToShow = currentLang === 'ar' ? item.ar : item.en;
            
            card.innerHTML = `
                <div class="cmd-icon">${item.emoji}</div>
                <div class="cmd-ar">${textToShow}</div>
                <div class="cmd-cn">${item.cn}</div>
            `;
            card.onclick = () => speakAndToast(item.cn, textToShow);
            grid.appendChild(card);
        });

        sec.appendChild(grid);
        contentEl.appendChild(sec);
    });
}

// دالة التبويب
function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const btn = document.querySelector(`[data-id="${id}"]`);
    if(btn) btn.classList.add('active');
    document.getElementById('sec-' + id).classList.add('active');
    
    // تمرير التبويب للعرض
    if(btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// النطق + الإشعار
let toastTimer;
function speakAndToast(cn, arOrEn) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(cn);
        u.lang = 'zh-CN';
        u.rate = 0.9;
        u.pitch = 1;
        window.speechSynthesis.speak(u);
    }

    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toast-text');
    // إظهار النصين في الإشعار
    toastText.textContent = cn + '  ·  ' + arOrEn;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// تشغيل أولي
renderContent();
</script>
